<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuxPuffHouse - Catálogo de Pods</title>
    
    <style>
        /* --- ÁREA DE ESTILOS (CSS) --- */
        /* Aqui você muda cores, tamanhos, fontes e posições */

        /* Importando uma fonte personalizada chamada 'site' do arquivo 'site.otf' */
        @font-face {
            font-family: 'site';
            src: url('site.otf') format('opentype');
        }

        /* Variáveis: Se você quiser mudar a cor do site inteiro, mude apenas aqui! */
        :root {
            --bg-color: #050505; /* Cor de fundo (quase preto) */
            --card-bg: #1e1e1e; /* Cor do fundo dos "cartões" dos produtos */
            --text-color: #f5f5f5; /* Cor principal do texto (branco gelo) */
            --accent-color: #aa04aa; /* Cor de destaque (Roxo/Magenta) - Mude aqui! */
            --secondary-text: #a4b0be; /* Cor de texto secundário (cinza claro) */
            --whatsapp-green: #25d366; /* Cor verde oficial do botão do WhatsApp */
            --danger-color: #ff4757; /* Cor vermelha para o botão de apagar do carrinho */
        }

        /* Configurações gerais do corpo da página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Fonte padrão do texto */
            color: var(--text-color); /* Usa a variável de cor de texto criada acima */
            margin: 0; /* Remove margens padrão do navegador */
            padding: 20px; /* Espaço interno nas bordas da tela */
            display: flex; /* Permite alinhar elementos facilmente */
            flex-direction: column; /* Organiza os itens de cima para baixo */
            align-items: center; /* Centraliza tudo no meio da tela */
            background-color: var(--bg-color); /* Usa a cor de fundo criada acima */
            
            /* Imagem de fundo da página */
            background-image: url('site.png'); /* Tente trocar 'site.png' pelo nome de outra imagem sua */
            background-size: cover; /* Faz a imagem cobrir a tela toda */
            background-position: center; /* Centraliza a imagem */
            background-repeat: no-repeat; /* Não deixa a imagem se repetir como um mosaico */
            background-attachment: fixed; /* A imagem fica parada enquanto você rola a página */
            padding-bottom: 100px; /* Dá um espaço no final para a barra do carrinho não tampar os produtos */
        }

        /* Estilos do cabeçalho (Título e subtítulo) */
        header { text-align: center; margin-bottom: 40px; }
        header h1 { 
            font-family: 'site', cursive; /* Usa a fonte personalizada importada lá em cima */
            color: var(--accent-color); /* Cor roxa */
            font-size: 3.5rem; /* Tamanho da letra do título */
            margin-bottom: 5px; 
        }
        header p { color: var(--secondary-text); font-size: 1.1rem; margin-top: 0; }

        /* A "caixa" que segura todos os produtos */
        .catalog-container {
            display: grid; /* Sistema de grade para organizar os produtos lado a lado */
            /* Essa linha mágica faz os produtos se adaptarem a qualquer tela (celular ou PC) automaticamente */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; /* Espaço entre os cartões de produtos */
            width: 100%;
            max-width: 1200px; /* Largura máxima para não ficar esticado em telas muito grandes */
        }

        /* O "cartão" de cada produto individual */
        .pod-card {
            background-color: var(--card-bg);
            border-radius: 12px; /* Arredonda as bordas */
            padding: 25px; /* Espaço interno do cartão */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* Sombra suave para dar efeito 3D */
            border-top: 4px solid var(--accent-color); /* Linha roxa no topo do cartão */
            transition: transform 0.2s ease; /* Efeito suave ao interagir */
            position: relative; /* Necessário para a imagem flutuante funcionar */
        }

        /* --- ESTILOS DA IMAGEM DO APARELHO --- */
        .pod-image-preview {
            position: absolute;
            top: -50px; /* Posiciona a imagem um pouco para cima */
            right: 20px; /* Joga a imagem para a direita */
            width: 120px; /* Tamanho da foto */
            height: auto;
            opacity: 0; /* Escondida por padrão */
            visibility: hidden;
            transition: all 0.3s ease; /* Efeito de surgimento suave */
            pointer-events: none; /* Evita que a imagem atrapalhe o clique nos botões */
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); /* Sombra bonita no pod */
            z-index: 10;
        }

        /* Quando passar o mouse no cartão, a imagem aparece (Apenas PC) */
        .pod-card:hover .pod-image-preview {
            opacity: 1;
            visibility: visible;
            transform: translateY(-10px); /* Dá um pulinho pra cima */
        }

        /* Ajuste para Celulares (Mostra a imagem fixa e menor) */
        @media (max-width: 768px) {
            .pod-image-preview {
                position: static; /* Tira o efeito flutuante */
                opacity: 1; /* Deixa sempre visível */
                visibility: visible;
                width: 100px; /* Fica menorzinha */
                display: block;
                margin: 0 auto 15px auto; /* Centraliza a imagem no cartão */
                filter: none;
            }
        }

        /* Estilos dos textos dentro do cartão de produto */
        .pod-title { font-size: 1.4rem; margin: 0 0 10px 0; color: #ffffff; }
        .pod-price { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); margin: 0 0 20px 0; }
        .flavors-title { font-size: 1rem; color: var(--secondary-text); border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; }

        /* Lista de sabores */
        .flavors-list { list-style-type: none; padding: 0; margin: 0; }
        
        /* Cada sabor individual (o botão clicável) */
        .flavors-list li {
            background-color: #2f3542;
            margin-bottom: 8px; /* Espaço entre os sabores */
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer; /* Muda a setinha do mouse para uma "mãozinha" indicando que é clicável */
            display: flex;
            justify-content: space-between; /* Separa o nome do sabor da tradução */
            align-items: center;
            transition: background 0.3s; /* Efeito suave ao passar o mouse */
        }

        /* O que acontece quando o mouse passa por cima de um sabor */
        .flavors-list li:hover { background-color: #3e4453; /* Fica ligeiramente mais claro */ }
        
        /* Adiciona o emoji de fumacinha antes de cada sabor automaticamente */
        .flavors-list li::before { content: '💨 '; }

        /* Estilo da tradução que fica escondida por padrão */
        .flavors-list li .translation {
            display: none; /* Esconde o texto */
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        /* Mostra a tradução apenas quando o mouse passa por cima (hover) */
        .flavors-list li:hover .translation { display: inline; }

        /* --- BARRA DO CARRINHO (RODAPÉ) --- */
        .cart-bar {
            position: fixed; /* Fica fixa na tela, mesmo se rolar a página */
            bottom: 0; left: 0; right: 0; /* Fixa bem colada na parte de baixo */
            background: rgba(20, 20, 20, 0.98); /* Fundo quase preto e transparente */
            padding: 15px 20px;
            display: none; /* Escondida por padrão. O JS vai mostrar quando tiver algo no carrinho */
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid var(--accent-color);
            z-index: 1000; /* Garante que fique por cima de tudo */
        }

        .cart-info { font-weight: bold; font-size: 1.1rem; }

        /* Botão "Ver Pedido" */
        .btn-view-cart {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        /* --- MODAL (JANELA) DO CARRINHO --- */
        /* O fundo escuro que aparece atrás da janelinha do carrinho */
        .cart-modal-overlay {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0; /* Cobre a tela toda */
            background: rgba(0,0,0,0.8); /* Fundo preto transparente */
            z-index: 2000; /* Fica por cima de tudo na tela */
            justify-content: center; /* Centraliza a janelinha na horizontal */
            align-items: center; /* Centraliza a janelinha na vertical */
        }

        /* A janelinha do carrinho em si */
        .cart-modal {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            padding: 20px;
            max-height: 80vh; /* Altura máxima para não passar da tela */
            display: flex;
            flex-direction: column;
        }

        /* Cabeçalho da janelinha (Título e botão de fechar) */
        .cart-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333; /* Linha divisória */
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .cart-modal-header h2 { margin: 0; font-size: 1.5rem; color: var(--accent-color); }
        .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

        /* Área onde os itens do pedido vão aparecer (permite rolagem se tiver muitos itens) */
        .cart-items-list {
            overflow-y: auto; 
            flex-grow: 1;
            margin-bottom: 15px;
        }

        /* Estilo de cada item adicionado no carrinho */
        .cart-item {
            background: #2f3542;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-details { display: flex; flex-direction: column; }
        .cart-item-model { font-size: 0.85rem; color: var(--secondary-text); }
        .cart-item-flavor { font-weight: bold; }

        /* Botão vermelho "X" para remover item do carrinho */
        .btn-remove {
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Botão verde do WhatsApp */
        .btn-finalize {
            background-color: var(--whatsapp-green);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>MuxPuffHouse</h1>
        <p>Catálogo Oficial de Pods</p>
    </header>

    <div class="catalog-container" id="catalog"></div>

    <div id="cartBar" class="cart-bar">
        <div class="cart-info">🛒 <span id="cartCount">0</span> item(s)</div>
        <button onclick="abrirCarrinho()" class="btn-view-cart">Ver Pedido</button>
    </div>

    <div id="cartModalOverlay" class="cart-modal-overlay">
        <div class="cart-modal">
            <div class="cart-modal-header">
                <h2>Seu Pedido</h2>
                <button onclick="fecharCarrinho()" class="close-btn">✖</button>
            </div>
            
            <div id="cartItemsList" class="cart-items-list"></div>

            <button onclick="finalizarPedido()" class="btn-finalize">
                💬 Enviar para o WhatsApp
            </button>
        </div>
    </div>

    <script>
        // 1. DICIONÁRIO DE TRADUÇÃO (Frases Completas)
        const traducoes = {
            "mint ice / pineapple ice": "Hortelã Gelada / Abacaxi Gelado",
            "grape ice / mint ice": "Uva Gelada / Hortelã Gelada",
            "grape ice": "Uva Gelada",
            "cool menthol": "Mentol Refrescante",
            "watermelon ice": "Melancia Gelada",
            "pineapple pom": "Abacaxi com Romã",
            "grape twist": "Tornado de Uva",
            "strawberry ice": "Morango Gelado",
            "blueberry bubble / sour green apple": "Chiclete de Mirtilo / Maçã Verde Azedinha",
            "grape / menthol": "Uva / Mentol",
            "icy mint": "Hortelã Gelada",
            "banana coconut water": "Banana com Água de Coco",
            "minty melon": "Melão Refrescante",
            "aloe grape ice": "Babosa com Uva Gelada",
            "strawberry kiwi": "Morango com Kiwi",
            "strawberry banana": "Morango com Banana",
            "black mint": "Menta Black",
            "triple berry": "Mix de Frutas Vermelhas",
            "neon twist": "Mistura Neon",
            "dragon strawnana": "Pitaya, Morango e Banana",
            "cherry strazz": "Cereja e Morango",
            "passion flash": "Explosão de Maracujá",
            "strawberry spark": "Morango Efervescente",
            "grape ice (dourado)": "Uva Gelada (Dourado)",
            "blueberry": "Mirtilo",
            "ice watermelon ice (dourado e preto)": "Melancia Gelada (Dourado e Preto)",
            "strawberry ice (dourado e preto)": "Morango Gelado (Dourado e Preto)",
            "sakura grape": "Uva com Flor de Cerejeira"
        };

        function traduzirSabor(texto) {
            const textoBusca = texto.toLowerCase();
            if (traducoes[textoBusca]) {
                return traducoes[textoBusca]; 
            } else {
                return texto;
            }
        }

        // 2. ESTOQUE DE PRODUTOS (Agora dinâmico da planilha)
        let produtos = []; 

        // Link da planilha integrado:
        const urlDaPlanilha = "https://script.google.com/macros/s/AKfycbwpx1yC8p64jaF7zzEsysq5Edt1zB6CH_KzhsY-Y1jsaKj1xC44cWNG5IFy1gvkyOCriQ/exec";

        // Função para buscar os dados lá do Google Sheets
        async function carregarEstoqueDaPlanilha() {
            const container = document.getElementById('catalog');
            container.innerHTML = '<p style="text-align:center; width:100%; font-size: 1.2rem;">Carregando estoque atualizado... 🔄</p>';

            try {
                // Tenta puxar as informações do link
                const resposta = await fetch(urlDaPlanilha);
                produtos = await resposta.json();

                // Depois de baixar os produtos, limpa a mensagem e desenha os cartões
                container.innerHTML = '';
                renderizarCatalogo();
            } catch (erro) {
                console.error("Erro ao carregar a planilha:", erro);
                container.innerHTML = '<p style="text-align:center; width:100%; color: var(--danger-color);">Erro ao carregar o estoque. Recarregue a página.</p>';
            }
        }

        // 3. LÓGICA DO CARRINHO
        let carrinho = []; 

        function adicionarAoCarrinho(modelo, sabor) {
            carrinho.push({ modelo, sabor }); 
            atualizarInterfaceCarrinho(); 
            alert(`✅ ${sabor} adicionado ao carrinho!`); 
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1); 
            atualizarInterfaceCarrinho(); 
            renderizarItensDoCarrinho(); 
            
            if(carrinho.length === 0) {
                fecharCarrinho();
            }
        }

        function atualizarInterfaceCarrinho() {
            const bar = document.getElementById('cartBar');
            const count = document.getElementById('cartCount');
            
            if (carrinho.length > 0) {
                bar.style.display = 'flex'; 
                count.innerText = carrinho.length; 
            } else {
                bar.style.display = 'none'; 
            }
        }

        function abrirCarrinho() {
            document.getElementById('cartModalOverlay').style.display = 'flex';
            renderizarItensDoCarrinho(); 
        }

        function fecharCarrinho() {
            document.getElementById('cartModalOverlay').style.display = 'none';
        }

        function renderizarItensDoCarrinho() {
            const lista = document.getElementById('cartItemsList');
            lista.innerHTML = ''; 

            carrinho.forEach((item, index) => {
                lista.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <span class="cart-item-model">${item.modelo}</span>
                            <span class="cart-item-flavor">${item.sabor}</span>
                        </div>
                        <button onclick="removerDoCarrinho(${index})" class="btn-remove">X</button>
                    </div>
                `;
            });
        }

        function finalizarPedido() {
            const numeroTel = "5551996155848"; 
            
            let mensagem = "Olá! Gostaria de fazer o seguinte pedido:\n\n";
            
            carrinho.forEach((item, index) => {
                mensagem += `*Item ${index + 1}:* ${item.modelo}\n*Sabor:* ${item.sabor}\n\n`;
            });

            mensagem += "Aguardo a confirmação e os dados para pagamento!";

            const linkZap = `https://wa.me/${numeroTel}?text=${encodeURIComponent(mensagem)}`;
            window.open(linkZap, '_blank'); 
        }

        // 4. RENDERIZAÇÃO DO CATÁLOGO (Cria a vitrine na tela inicial)
        function renderizarCatalogo() {
            const container = document.getElementById('catalog'); 

            produtos.forEach(produto => {
                const card = document.createElement('div'); 
                card.className = 'pod-card';

                let saboresHTML = '';
                // Adicionei uma verificação extra (produto.sabores &&) pra garantir que não dê erro se vier vazio
                if (produto.sabores && produto.sabores.length > 0) {
                    const listaSabores = produto.sabores.map(sabor => {
                        const traducao = traduzirSabor(sabor); 
                        return `
                            <li onclick="adicionarAoCarrinho('${produto.modelo}', '${sabor}')" title="Clique para adicionar">
                                <span>${sabor}</span>
                                <span class="translation">(${traducao})</span>
                            </li>`;
                    }).join('');
                    saboresHTML = `<ul class="flavors-list">${listaSabores}</ul>`;
                } else {
                    saboresHTML = `<p class="no-flavors">Sabores esgotados...</p>`;
                }

                // Verifica se tem link de imagem na planilha. Se não tiver, puxa uma imagem padrão cinza.
                const urlImagem = produto.imagem ? produto.imagem : 'https://via.placeholder.com/120x180/1e1e1e/a4b0be?text=Sem+Foto';

                card.innerHTML = `
                    <img src="${urlImagem}" alt="Foto do ${produto.modelo}" class="pod-image-preview">
                    <h2 class="pod-title">${produto.modelo}</h2>
                    <p class="pod-price">${produto.preco}</p>
                    <div class="flavors-title">Toque no sabor para adicionar:</div>
                    ${saboresHTML}
                `;
                
                container.appendChild(card); 
            });
        }

        // 5. INICIALIZAÇÃO
        // Quando o site abre, ele agora chama a planilha primeiro, e a planilha chama o catálogo
        carregarEstoqueDaPlanilha();

    </script>
</body>
</html>
